<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Marriage Certificate 💍</title>
<style>
  body {
    margin: 0;
    background: #fdf6ef;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .cert-wrapper {
    max-width: 680px;
    width: 100%;
  }
</style>
</head>
<body>
<div class="cert-wrapper">
<svg width="100%" viewBox="0 0 680 920" role="img">
  <title>Marriage Certificate</title>
  <desc>A romantic marriage certificate with decorative borders, couple names, and signature lines</desc>

  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#c9a96e" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="920" fill="#fdf6ef"/>
  <rect x="0" y="0" width="680" height="920" fill="url(#dots)"/>

  <!-- Outer border -->
  <rect x="18" y="18" width="644" height="884" fill="none" stroke="#c9a96e" stroke-width="1.5" rx="4"/>
  <!-- Inner border -->
  <rect x="28" y="28" width="624" height="864" fill="none" stroke="#c9a96e" stroke-width="0.5" rx="3"/>
  <!-- Thin accent border -->
  <rect x="34" y="34" width="612" height="852" fill="none" stroke="#e8d4a8" stroke-width="0.5" rx="2"/>

  <!-- Corner ornaments top left -->
  <g stroke="#c9a96e" fill="none" stroke-width="0.8">
    <path d="M18 60 Q18 18 60 18"/>
    <path d="M18 75 Q18 18 75 18"/>
    <circle cx="46" cy="46" r="4" fill="#c9a96e" opacity="0.5"/>
  </g>
  <!-- Corner ornaments top right -->
  <g stroke="#c9a96e" fill="none" stroke-width="0.8">
    <path d="M662 60 Q662 18 620 18"/>
    <path d="M662 75 Q662 18 605 18"/>
    <circle cx="634" cy="46" r="4" fill="#c9a96e" opacity="0.5"/>
  </g>
  <!-- Corner ornaments bottom left -->
  <g stroke="#c9a96e" fill="none" stroke-width="0.8">
    <path d="M18 860 Q18 902 60 902"/>
    <path d="M18 845 Q18 902 75 902"/>
    <circle cx="46" cy="874" r="4" fill="#c9a96e" opacity="0.5"/>
  </g>
  <!-- Corner ornaments bottom right -->
  <g stroke="#c9a96e" fill="none" stroke-width="0.8">
    <path d="M662 860 Q662 902 620 902"/>
    <path d="M662 845 Q662 902 605 902"/>
    <circle cx="634" cy="874" r="4" fill="#c9a96e" opacity="0.5"/>
  </g>

  <!-- Top decorative divider -->
  <line x1="80" y1="90" x2="600" y2="90" stroke="#e8d4a8" stroke-width="0.5"/>
  <line x1="80" y1="94" x2="600" y2="94" stroke="#c9a96e" stroke-width="0.8"/>
  <line x1="80" y1="98" x2="600" y2="98" stroke="#e8d4a8" stroke-width="0.5"/>
  <circle cx="340" cy="94" r="5" fill="#fdf6ef" stroke="#c9a96e" stroke-width="0.8"/>
  <circle cx="340" cy="94" r="2.5" fill="#c9a96e"/>
  <circle cx="80" cy="94" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="600" cy="94" r="3" fill="#c9a96e" opacity="0.5"/>

  <!-- Crown decorative top -->
  <text x="340" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#c9a96e" opacity="0.7">✦ ♡ ✦</text>

  <!-- Title -->
  <text x="340" y="178" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b08080" letter-spacing="6">CERTIFICATE OF</text>
  <text x="340" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="400" fill="#c0727a" letter-spacing="3" font-style="italic">Marriage</text>

  <!-- Subtitle line -->
  <line x1="120" y1="248" x2="560" y2="248" stroke="#e8d4a8" stroke-width="0.5"/>
  <text x="340" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#b08080" letter-spacing="4">THIS CERTIFIES THAT</text>
  <line x1="120" y1="280" x2="560" y2="280" stroke="#e8d4a8" stroke-width="0.5"/>

  <!-- Name 1 -->
  <text x="340" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-style="italic" fill="#4a3535" letter-spacing="1">Lharrah Jhade G. Angcaya</text>
  <line x1="100" y1="352" x2="580" y2="352" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="340" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="3">Bride's Name</text>

  <!-- And -->
  <text x="340" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#c9a96e">&amp;</text>

  <!-- Name 2 -->
  <text x="340" y="460" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-style="italic" fill="#4a3535" letter-spacing="1">CJ P. Dael</text>
  <line x1="100" y1="472" x2="580" y2="472" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="340" y="488" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="3">Groom's Name</text>

  <!-- Body text -->
  <text x="340" y="530" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a5555" font-style="italic">were united together in love and commitment</text>
  <text x="340" y="550" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a5555" font-style="italic">on this day of</text>

  <!-- Date line -->
  <text x="340" y="595" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#4a3535">April 19, 2026</text>
  <line x1="160" y1="607" x2="520" y2="607" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="340" y="622" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="3">DATE</text>

  <!-- Venue -->
  <text x="340" y="655" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#7a5555" font-style="italic">at</text>
  <text x="340" y="685" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#4a3535">Our Special Place</text>
  <line x1="140" y1="697" x2="540" y2="697" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="340" y="712" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="3"></text>

  <!-- Decorative center divider -->
  <text x="340" y="745" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c9a96e" opacity="0.6">· · · ♡ · · ·</text>

  <!-- Signature section -->
  <line x1="80" y1="800" x2="270" y2="800" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="175" y="816" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="2">SIGNATURE</text>

  <line x1="410" y1="800" x2="600" y2="800" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="505" y="816" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="2">SIGNATURE</text>

  <!-- Heart seal center -->
  <circle cx="340" cy="800" r="22" fill="#fdf6ef" stroke="#c9a96e" stroke-width="0.8"/>
  <text x="340" y="807" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#c0727a">♡</text>

  <!-- Bottom decorative divider -->
  <line x1="80" y1="845" x2="600" y2="845" stroke="#e8d4a8" stroke-width="0.5"/>
  <line x1="80" y1="849" x2="600" y2="849" stroke="#c9a96e" stroke-width="0.8"/>
  <line x1="80" y1="853" x2="600" y2="853" stroke="#e8d4a8" stroke-width="0.5"/>
  <circle cx="340" cy="849" r="5" fill="#fdf6ef" stroke="#c9a96e" stroke-width="0.8"/>
  <circle cx="340" cy="849" r="2.5" fill="#c9a96e"/>

  <!-- Bottom text -->
  <text x="340" y="876" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b08080" letter-spacing="3" font-style="italic">forever &amp; always  ♡</text>
</svg>
</div>
</body>
</html>
